name: Download and Hash

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "URL of the file"
        required: true
        type: string

permissions:
  contents: write

jobs:
  hash:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and calculate hash
        run: |
          HASH=$(curl -L "${{ github.event.inputs.file_url }}" | sha256sum | awk '{print $1}')
          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") $HASH ${{ github.event.inputs.file_url }}" >> hashes.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add hashes.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Add hash entry"
          git push
